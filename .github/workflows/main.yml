name: Run Jetimob Automation

on:
  schedule:
    # 23:42 GMT-3 is 02:42 UTC
    - cron: '42 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation
        env:
          JETIMOB_WEBSERVICE_KEY: ${{ secrets.JETIMOB_WEBSERVICE_KEY }}
          CANALPRO_EMAIL: ${{ secrets.CANALPRO_EMAIL }}
          CANALPRO_PASSWORD: ${{ secrets.CANALPRO_PASSWORD }}
          JETIMOB_EMAIL: ${{ secrets.JETIMOB_EMAIL }}
          JETIMOB_PASSWORD: ${{ secrets.JETIMOB_PASSWORD }}
          DOCKER_ENV: "1" # Ensures no GUI and runs once
        run: python main.py

      - name: Upload Logs and Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-reports
          path: |
            relatorio_execucao.txt
            jetimob_erros.json
            jetimob_progresso.json
            err.txt
            imoveis_nao_encontrados.txt
            *.png
          retention-days: 7
